version: "3"
services:
  postgres:
    container_name: postgres
    image: postgres:12.2-alpine
    restart: always
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "8081"
      - "5432"
    ports:
      - "5432:5432"
      - "8081:8081"

  nakama:
    container_name: nakama
    image: heroiclabs/nakama:3.27.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    restart: always
    links:
      - "postgres:db"
    depends_on:
      - postgres
    volumes:
      - ./local.yml:/nakama/data/local.yml
      - ./backend/nakama/build:/nakama/data/modules
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
