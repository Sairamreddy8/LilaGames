
services:
  postgres:
    container_name: postgres
    image: postgres:12.2-alpine
    restart: always
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # avoid conflict with your other postgres
    networks:
      - nakama-net

  nakama:
    container_name: nakama
    image: heroiclabs/nakama:3.27.0
    restart: always
    depends_on:
      - postgres
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama
    volumes:
      - ./local.yml:/nakama/data/local.yml
      - ./backend/nakama/build:/nakama/data/modules
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    networks:
      - nakama-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  nakama-net: